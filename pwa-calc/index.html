<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PriceCalc">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Price Calculator</title>
<style>
  @font-face {
    font-family: 'DM Sans';
    font-style: normal;
    font-weight: 400 600;
    src: local('DM Sans'), local('DMSans'), local('-apple-system'), local('San Francisco');
  }
</style>
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f7f8fa;
    --border: #e4e7ec;
    --text: #111827;
    --text2: #6b7280;
    --text3: #9ca3af;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --mahal: #dc2626;
    --mahal-bg: #fef2f2;
    --medium: #d97706;
    --medium-bg: #fffbeb;
    --mura: #16a34a;
    --mura-bg: #f0fdf4;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
    --numpad-w: 224px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 60px;
    touch-action: manipulation;
  }

  .app { max-width: 820px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 18px; }
  h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.4px; color: var(--text); }

  /* Tabs */
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    background: var(--surface); border-radius: var(--radius);
    padding: 4px; gap: 4px; margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .tab-btn {
    padding: 11px 6px; border: none; border-radius: 10px;
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    background: transparent; color: var(--text2);
  }
  .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }

  /* Two-column workspace */
  .workspace {
    display: grid;
    grid-template-columns: 1fr var(--numpad-w);
    gap: 14px;
    align-items: start;
  }

  .left-panel { min-width: 0; }

  .view { display: none; }
  .view.active { display: block; }

  /* Item card */
  .card {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden;
  }
  .card-header { padding: 12px 16px 8px; display: flex; align-items: center; justify-content: space-between; }
  .card-header-left { display: flex; align-items: center; gap: 8px; }
  .item-dot {
    width: 28px; height: 28px; background: var(--accent-light);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--accent);
  }
  .card-title { font-size: 14px; font-weight: 600; }
  .remove-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 22px; line-height: 1;
    padding: 2px 6px; border-radius: 6px; transition: color 0.15s, background 0.15s;
  }
  .remove-btn:active { color: var(--mahal); background: var(--mahal-bg); }

  .clear-card-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); padding: 4px 7px; border-radius: 6px;
    display: flex; align-items: center; gap: 4px;
    font-family: inherit; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
    transition: color 0.15s, background 0.15s;
  }
  .clear-card-btn:active { color: var(--medium); background: var(--medium-bg); }
  .clear-card-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* Fields */
  .fields { padding: 0 14px 14px; display: grid; gap: 9px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
  .field-row.base-row { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }

  .field input {
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 16px; font-weight: 700;
    color: var(--text); background: var(--surface2);
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
    cursor: pointer;
    caret-color: transparent;
  }
  .field input.active-field {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    background: white;
    caret-color: var(--accent);
  }
  .field input::placeholder { color: var(--text3); font-weight: 400; }

  /* Add item */
  .add-item-btn {
    width: 100%; padding: 12px; background: var(--surface); color: var(--accent);
    border: 1.5px dashed #93c5fd; border-radius: var(--radius);
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; margin-bottom: 10px; transition: all 0.15s;
  }
  .add-item-btn:active { background: var(--accent-light); }

  .calc-btn {
    width: 100%; padding: 14px; background: var(--accent); color: white;
    border: none; border-radius: var(--radius);
    font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    transition: transform 0.12s;
  }
  .calc-btn:active { transform: scale(0.98); }

  .back-btn {
    width: 100%; padding: 12px; background: transparent; color: var(--text2);
    border: 1.5px solid var(--border); border-radius: var(--radius);
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; margin-bottom: 14px;
  }
  .back-btn:active { background: var(--surface2); }

  /* ── Numpad ── */
  .right-panel {
    position: sticky;
    top: 20px;
  }

  .numpad-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px;
    user-select: none;
  }

  .numpad-display {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-bottom: 10px;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .numpad-field-label {
    font-size: 10px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .numpad-value {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 22px; font-weight: 700; color: var(--text);
    letter-spacing: -0.3px; line-height: 1.1;
    min-height: 27px;
    word-break: break-all;
  }
  .numpad-value.empty { color: var(--text3); font-weight: 400; font-size: 14px; padding-top: 4px; }

  .numpad-hint {
    font-size: 11px; color: var(--text3); text-align: center;
    margin-bottom: 10px; line-height: 1.4;
  }

  .numpad-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 7px;
  }

  .np-btn {
    aspect-ratio: 1.05;
    border: none;
    border-radius: 10px;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 22px; font-weight: 700;
    cursor: pointer;
    transition: transform 0.08s, background 0.08s;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2);
    color: var(--text);
  }
  .np-btn:active { transform: scale(0.88); background: #dde1e8; }

  .np-btn.zero  { grid-column: span 2; aspect-ratio: auto; padding: 14px; }
  .np-btn.dot   { font-size: 26px; }
  .np-btn.del   { background: #fef2f2; color: var(--mahal); font-size: 18px; }
  .np-btn.del:active { background: #fecaca; }
  .np-btn.clear {
    grid-column: span 3; aspect-ratio: auto; padding: 12px;
    background: var(--surface2); color: var(--text2);
    font-size: 13px; font-weight: 600; border-radius: 10px;
  }
  .np-btn.done {
    grid-column: span 3; aspect-ratio: auto; padding: 14px;
    background: var(--accent); color: white;
    font-size: 15px; font-weight: 600; border-radius: 10px;
    margin-top: 2px;
  }
  .np-btn.done:active { background: #1d4ed8; transform: scale(0.98); }

  /* Idle state — no field selected */
  .numpad-card.idle .np-btn:not(.done) { opacity: 0.4; pointer-events: none; }

  /* ── Results ── */
  .results-title {
    font-size: 10px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; padding-left: 2px;
  }
  .result-cards { display: grid; gap: 9px; margin-bottom: 12px; }
  .result-item {
    background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
    border: 1.5px solid transparent;
  }
  .result-item.winner { border-color: var(--mura); box-shadow: 0 0 0 3px rgba(22,163,74,0.07), var(--shadow); }
  .result-left { display: flex; flex-direction: column; gap: 3px; }
  .result-item-num { font-size: 11px; color: var(--text3); font-weight: 500; }
  .result-price { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; line-height: 1.1; }
  .result-breakdown { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 11px; font-weight: 500; color: var(--text3); }
  .result-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
  .badge { padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-mahal  { background: var(--mahal-bg);  color: var(--mahal); }
  .badge-medium { background: var(--medium-bg); color: var(--medium); }
  .badge-mura   { background: var(--mura-bg);   color: var(--mura); }
  .rank-text { font-size: 11px; color: var(--text3); }

  .summary {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 12px 16px; margin-bottom: 12px; display: grid; gap: 7px;
  }
  .summary-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  .summary-label { color: var(--text2); }
  .summary-value { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-weight: 700; font-size: 14px; }
  .summary-divider { height: 1px; background: var(--border); margin: 1px 0; }

  .steps-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; padding-left: 2px; }
  .steps-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 12px 16px; margin-bottom: 9px; }
  .steps-item-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 9px; }
  .step-flow { display: flex; align-items: center; gap: 5px; }
  .step-pill { display: flex; flex-direction: column; background: var(--surface2); border-radius: var(--radius-sm); padding: 7px 10px; flex: 1; }
  .step-pill-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
  .step-pill-val { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 13px; font-weight: 700; }
  .step-arrow { color: var(--text3); font-size: 13px; flex-shrink: 0; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

  <div class="header"><h1>Price Calculator</h1></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('three')">3 Items</button>
    <button class="tab-btn"        onclick="switchTab('two')">2 Items</button>
    <button class="tab-btn"        onclick="switchTab('others')">Others</button>
  </div>

  <div class="workspace">

    <!-- LEFT: item cards + results -->
    <div class="left-panel">

      <div class="view active" id="tab-three">
        <div id="input-three">
          <div id="cards-three"></div>
          <button class="calc-btn" onclick="calculate('three')">Calculate Prices</button>
        </div>
        <div id="results-three" class="hidden">
          <button class="back-btn" onclick="showInputs('three')">← Edit inputs</button>
          <div id="results-body-three"></div>
        </div>
      </div>

      <div class="view" id="tab-two">
        <div id="input-two">
          <div id="cards-two"></div>
          <button class="calc-btn" onclick="calculate('two')">Calculate Prices</button>
        </div>
        <div id="results-two" class="hidden">
          <button class="back-btn" onclick="showInputs('two')">← Edit inputs</button>
          <div id="results-body-two"></div>
        </div>
      </div>

      <div class="view" id="tab-others">
        <div id="input-others">
          <div id="cards-others"></div>
          <button class="add-item-btn" onclick="addOtherItem()">+ Add another item</button>
          <button class="calc-btn" onclick="calculate('others')">Calculate Prices</button>
        </div>
        <div id="results-others" class="hidden">
          <button class="back-btn" onclick="showInputs('others')">← Edit inputs</button>
          <div id="results-body-others"></div>
        </div>
      </div>

    </div>

    <!-- RIGHT: Numpad -->
    <div class="right-panel">
      <div class="numpad-card idle" id="numpad">

        <div class="numpad-display">
          <div class="numpad-field-label" id="np-label">Tap a field</div>
          <div class="numpad-value empty" id="np-value">Select a field to begin</div>
        </div>

        <p class="numpad-hint" id="np-hint">Tap any input field on the left</p>

        <div class="numpad-grid">
          <button class="np-btn" onclick="npPress('7')">7</button>
          <button class="np-btn" onclick="npPress('8')">8</button>
          <button class="np-btn" onclick="npPress('9')">9</button>
          <button class="np-btn" onclick="npPress('4')">4</button>
          <button class="np-btn" onclick="npPress('5')">5</button>
          <button class="np-btn" onclick="npPress('6')">6</button>
          <button class="np-btn" onclick="npPress('1')">1</button>
          <button class="np-btn" onclick="npPress('2')">2</button>
          <button class="np-btn" onclick="npPress('3')">3</button>
          <button class="np-btn zero" onclick="npPress('0')">0</button>
          <button class="np-btn dot"  onclick="npPress('.')">.</button>
          <button class="np-btn del"  onclick="npDel()">⌫</button>
          <button class="np-btn clear" onclick="npClear()">Clear field</button>
          <button class="np-btn done"  onclick="npDone()">Done ✓</button>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
let currentTab  = 'three';
let otherCount  = 1;
let activeInput = null;
let npBuffer    = '';

const DEFAULTS = {
  three:  [{b:2593,d1:40,d2:10,d3:2},{b:2000,d1:30,d2:1.5,d3:0},{b:3350,d1:60,d2:0,d3:0}],
  two:    [{b:4250,d1:30,d2:5,d3:2},{b:4740,d1:40,d2:10,d3:2}],
  others: [{b:'',d1:'',d2:'',d3:''}]
};

/* ── Numpad ── */
function activateField(input, label) {
  if (activeInput) activeInput.classList.remove('active-field');
  activeInput = input;
  activeInput.classList.add('active-field');
  npBuffer = (input.value && input.value !== '0') ? String(input.value) : '';
  document.getElementById('np-label').textContent = label;
  updateDisplay();
  const card = document.getElementById('numpad');
  card.classList.remove('idle');
  document.getElementById('np-hint').textContent = 'Tap numbers below to enter value';
}

function updateDisplay() {
  const el = document.getElementById('np-value');
  if (npBuffer === '') {
    el.textContent = '0';
    el.classList.add('empty');
  } else {
    el.textContent = npBuffer;
    el.classList.remove('empty');
  }
}

function npPress(ch) {
  if (!activeInput) return;
  if (ch === '.' && npBuffer.includes('.')) return;
  if (npBuffer === '0' && ch !== '.') { npBuffer = ch; }
  else { npBuffer += ch; }
  updateDisplay();
  activeInput.value = npBuffer;
}

function npDel() {
  if (!activeInput) return;
  npBuffer = npBuffer.slice(0, -1);
  updateDisplay();
  activeInput.value = npBuffer;
}

function npClear() {
  if (!activeInput) return;
  npBuffer = '';
  updateDisplay();
  activeInput.value = '';
}

function npDone() {
  if (activeInput) {
    activeInput.classList.remove('active-field');
    activeInput = null;
  }
  npBuffer = '';
  document.getElementById('np-label').textContent = 'Tap a field';
  const vEl = document.getElementById('np-value');
  vEl.textContent = 'Select a field to begin';
  vEl.classList.add('empty');
  document.getElementById('np-hint').textContent = 'Tap any input field on the left';
  document.getElementById('numpad').classList.add('idle');
}

/* ── Tabs ── */
function switchTab(name) {
  currentTab = name;
  npDone();
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', ['three','two','others'][i] === name));
  document.querySelectorAll('.view').forEach((v,i) =>
    v.classList.toggle('active', ['three','two','others'][i] === name));
}

/* ── Cards ── */
function buildCard(id, label, d, removable) {
  const discountFields = ['d1','d2','d3'].map((k,i) => `
    <div class="field">
      <label>Discount ${i+1} %</label>
      <input readonly id="${k}-${id}" value="${d[k]}" placeholder="0"
        onclick="activateField(this, 'Item ${label} — Discount ${i+1}')">
    </div>`).join('');

  return `<div class="card" id="card-${id}">
    <div class="card-header">
      <div class="card-header-left">
        <div class="item-dot">${label}</div>
        <div class="card-title">Item ${label}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;">
        <button class="clear-card-btn" onclick="clearCard('${id}')" title="Clear all fields">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 4h12M6 4V2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V4M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Clear
        </button>
        ${removable ? `<button class="remove-btn" onclick="removeItem('${id}')">×</button>` : ''}
      </div>
    </div>
    <div class="fields">
      <div class="field-row base-row">
        <div class="field">
          <label>Base Price (₱)</label>
          <input readonly id="b-${id}" value="${d.b}" placeholder="Tap to enter"
            onclick="activateField(this, 'Item ${label} — Base Price')">
        </div>
      </div>
      <div class="field-row">${discountFields}</div>
    </div>
  </div>`;
}

function buildInputs(tab) {
  const container = document.getElementById(`cards-${tab}`);
  container.innerHTML = '';
  if (tab === 'others') {
    otherCount = 1;
    container.innerHTML = buildCard('oth-0', 1, DEFAULTS.others[0], false);
  } else {
    DEFAULTS[tab].forEach((d,i) => { container.innerHTML += buildCard(`${tab}-${i}`, i+1, d, false); });
  }
}

function addOtherItem() {
  const n = otherCount++;
  document.getElementById('cards-others').innerHTML += buildCard(`oth-${n}`, n+1, {b:'',d1:'',d2:'',d3:''}, true);
  renumberOthers();
}

function clearCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.querySelectorAll('input').forEach(inp => { inp.value = ''; });
  if (activeInput && card.contains(activeInput)) { npBuffer = ''; updateDisplay(); }
}

function removeItem(id) {
  if (activeInput && document.getElementById(`card-${id}`)?.contains(activeInput)) npDone();
  document.getElementById(`card-${id}`).remove();
  renumberOthers();
}

function renumberOthers() {
  document.querySelectorAll('#cards-others .card').forEach((c,i) => {
    c.querySelector('.item-dot').textContent = i+1;
    c.querySelector('.card-title').textContent = `Item ${i+1}`;
  });
}

/* ── Calculate ── */
function readOne(id) {
  const base = parseFloat(document.getElementById(`b-${id}`)?.value)  || 0;
  const d1   = parseFloat(document.getElementById(`d1-${id}`)?.value) || 0;
  const d2   = parseFloat(document.getElementById(`d2-${id}`)?.value) || 0;
  const d3   = parseFloat(document.getElementById(`d3-${id}`)?.value) || 0;
  const s1 = base*(1-d1/100), s2 = s1*(1-d2/100), s3 = s2*(1-d3/100);
  return { base, d1, d2, d3, step1:s1, step2:s2, final:s3 };
}

function readItems(tab) {
  if (tab === 'others') {
    return Array.from(document.querySelectorAll('#cards-others .card'))
      .map(c => readOne(c.id.replace('card-','')));
  }
  const count = tab === 'three' ? 3 : 2;
  return Array.from({length: count}, (_,i) => readOne(`${tab}-${i}`));
}

function fmt(n) {
  return '₱' + n.toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function getLabel(rank, total) {
  if (rank === 1) return 'Mahal';
  if (rank === total) return 'Mura';
  return 'Medium';
}

function calculate(tab) {
  npDone();
  const items = readItems(tab);
  if (!items.length) return;
  const finals     = items.map(it => it.final);
  const sortedDesc = [...finals].sort((a,b) => b-a);
  const ranks      = finals.map(f => sortedDesc.indexOf(f) + 1);
  const total      = items.length;
  const maxF       = Math.max(...finals);
  const minF       = Math.min(...finals);

  let html = `<div class="results-title">Results</div><div class="result-cards">`;
  items.forEach((it, i) => {
    const lbl = getLabel(ranks[i], total);
    const bc  = lbl==='Mahal'?'badge-mahal':lbl==='Medium'?'badge-medium':'badge-mura';
    const cc  = ranks[i]===total ? 'winner' : '';
    const parts = [it.d1,it.d2,it.d3].filter(Boolean).map(d=>`${d}%`);
    const breakdown = parts.length ? `<div class="result-breakdown">Discounts: ${parts.join(' → ')}</div>` : '';
    html += `<div class="result-item ${cc}">
      <div class="result-left">
        <div class="result-item-num">Item ${i+1} · Base ${fmt(it.base)}</div>
        <div class="result-price">${fmt(it.final)}</div>
        ${breakdown}
      </div>
      <div class="result-right">
        <span class="badge ${bc}">${lbl}</span>
        <span class="rank-text">Rank #${ranks[i]}</span>
      </div>
    </div>`;
  });
  html += `</div>
  <div class="summary">
    <div class="summary-row"><span class="summary-label">Cheapest (Mura)</span><span class="summary-value" style="color:var(--mura)">${fmt(minF)}</span></div>
    <div class="summary-row"><span class="summary-label">Most expensive (Mahal)</span><span class="summary-value" style="color:var(--mahal)">${fmt(maxF)}</span></div>
    <div class="summary-divider"></div>
    <div class="summary-row"><span class="summary-label">Price gap</span><span class="summary-value">${fmt(maxF-minF)}</span></div>
    ${total>=2?`<div class="summary-row"><span class="summary-label">Item 1 vs Item 2 diff</span><span class="summary-value">${fmt(finals[0]-finals[1])}</span></div>`:''}
  </div>`;

  const hasSteps = items.some(it => it.d1||it.d2||it.d3);
  if (hasSteps) {
    html += `<div class="steps-title">Discount steps</div>`;
    items.forEach((it,i) => {
      if (!it.d1&&!it.d2&&!it.d3) return;
      html += `<div class="steps-card">
        <div class="steps-item-label">Item ${i+1} — starting at ${fmt(it.base)}</div>
        <div class="step-flow">
          <div class="step-pill"><span class="step-pill-label">After ${it.d1||0}%</span><span class="step-pill-val">${fmt(it.step1)}</span></div>
          <span class="step-arrow">›</span>
          <div class="step-pill"><span class="step-pill-label">After ${it.d2||0}%</span><span class="step-pill-val">${fmt(it.step2)}</span></div>
          <span class="step-arrow">›</span>
          <div class="step-pill"><span class="step-pill-label">After ${it.d3||0}%</span><span class="step-pill-val">${fmt(it.final)}</span></div>
        </div>
      </div>`;
    });
  }

  document.getElementById(`results-body-${tab}`).innerHTML = html;
  document.getElementById(`input-${tab}`).classList.add('hidden');
  document.getElementById(`results-${tab}`).classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

function showInputs(tab) {
  document.getElementById(`input-${tab}`).classList.remove('hidden');
  document.getElementById(`results-${tab}`).classList.add('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

buildInputs('three');
buildInputs('two');
buildInputs('others');

/* ── PWA: Service Worker registration ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW registered — app is now offline-ready'))
      .catch(e => console.warn('SW registration failed:', e));
  });
}
</script>
</body>
</html>
